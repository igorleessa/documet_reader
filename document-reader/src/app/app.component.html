<div class="app-container">
  <header class="app-header">
    <div class="header-content">
      <a routerLink="/" class="logo">
        <span class="logo-icon">📄</span>
        <span class="logo-text">Document Reader</span>
      </a>
      <nav class="header-nav">
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-link">Documentos</a>
        <a routerLink="/sessions" routerLinkActive="active" class="nav-link">Sessões</a>
      </nav>
    </div>
  </header>

  <main class="app-main">
    <router-outlet></router-outlet>
  </main>

  <footer class="app-footer">
    <p>Document Reader — Visualizador de Documentos Markdown</p>
  </footer>
</div>
